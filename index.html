<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Powerlifting Tracker</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Powerlifting Tracker</h1>

  <button onclick="exportWorkouts()">Export Workouts (.txt)</button>
  <input type="file" id="importFile" />

  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;">
  <button onclick="prevMonth()">Prev</button>
  <h2 id="monthLabel" style="margin:0;"></h2>
  <button onclick="nextMonth()">Next</button>
</div>
<div class="calendar" id="calendar"></div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="selectedDate"></h2>

      <textarea id="workoutText" placeholder="Write your workout..."></textarea>

      <button onclick="saveWorkout()">Save Workout</button>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <div class="calculator">
    <h2>RPE Calculator</h2>

    <input type="number" id="weight" placeholder="Weight (kg)" />
    <input type="number" id="reps" placeholder="Reps" />
    <input type="number" step="0.5" id="rpe" placeholder="RPE" />

    <button onclick="calculate1RM()">Calculate Estimated 1RM</button>

    <div class="result" id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
