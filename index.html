<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Powerlifting Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Powerlifting Tracker</h1>

  <div class="top-bar">
    <button onclick="exportWorkouts()">Export .txt</button>
    <input type="file" id="importFile" />
  </div>

  <div class="month-nav">
    <button onclick="prevMonth()">Prev</button>
    <h2 id="monthLabel"></h2>
    <button onclick="nextMonth()">Next</button>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="selectedDate"></h2>
      <textarea id="workoutText" placeholder="Write workout..."></textarea>
      <button onclick="saveWorkout()">Save</button>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <div class="calculator">
    <h2>RPE Calculator</h2>
    <input id="weight" type="number" placeholder="Weight (kg)" />
    <input id="reps" type="number" placeholder="Reps" />
    <input id="rpe" type="number" step="0.5" placeholder="RPE" />
    <button onclick="calculate1RM()">Calculate 1RM</button>
    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
